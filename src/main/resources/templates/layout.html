<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${title} ?: 'RepuestosCloud'">RepuestosCloud</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/productos}">RepuestosCloud</a>

    <div class="ms-auto d-flex gap-2">
      <a class="btn btn-soft btn-sm" th:href="@{/productos}">Catálogo</a>
      <a class="btn btn-soft btn-sm" th:href="@{/carrito}">🛒 Carrito</a>

      <!-- Si NO está logueado -->
      <a class="btn btn-brand btn-sm" th:if="${#authorization.expression('isAnonymous()')}" th:href="@{/login}">Entrar</a>

      <!-- Si SÍ está logueado -->
      <a class="btn btn-danger-soft btn-sm" th:if="${#authorization.expression('isAuthenticated()')}" th:href="@{/logout}">Salir</a>
    </div>
  </div>
</nav>

<div class="page-wrap">
  <div class="container" th:insert="${content}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
