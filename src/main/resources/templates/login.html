<div th:with="title='Registro', content=~{::section}"
     th:replace="layout :: none"></div>

<section class="row justify-content-center">
    <div class="col-md-6">
        <div class="table-darkish p-4">
            <h2 class="page-title mb-1">Crear cuenta</h2>
            <p class="page-subtitle mb-3">Completá tus datos.</p>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/registro}" method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Usuario</label>
                        <input class="form-control" name="username" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Contraseña</label>
                        <input class="form-control" type="password" name="password" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre</label>
                        <input class="form-control" name="nombre" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Apellidos</label>
                        <input class="form-control" name="apellidos" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Correo</label>
                        <input class="form-control" type="email" name="correo">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Teléfono</label>
                        <input class="form-control" name="telefono">
                    </div>
                </div>

                <button class="btn btn-brand w-100">Registrarme</button>
            </form>

            <div class="mt-3">
                <a class="btn btn-soft w-100" th:href="@{/login}">Volver al login</a>
            </div>
        </div>
    </div>
</section>
