<div th:with="title='Admin - Producto', content=~{::section}"
     th:replace="layout :: none"></div>

<section>
  <div class="mb-4">
    <h1 class="page-title" th:text="${p.idProducto == null ? 'Nuevo producto' : 'Editar producto'}">Producto</h1>
    <p class="page-subtitle">Completa la info y subí una imagen (Firebase).</p>
  </div>

  <div class="table-darkish p-4">
    <form th:action="@{/admin/productos/guardar}" method="post" enctype="multipart/form-data">

      <input type="hidden" name="idProducto" th:value="${p.idProducto}">

      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Nombre</label>
          <input class="form-control" name="nombre" th:value="${p.nombre}" required>
        </div>

        <div class="col-md-3">
          <label class="form-label">Precio</label>
          <input class="form-control" type="number" step="0.01" name="precio" th:value="${p.precio}" required>
        </div>

        <div class="col-md-3">
          <label class="form-label">Stock</label>
          <input class="form-control" type="number" min="0" name="stock" th:value="${p.stock}" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Marca</label>
          <select class="form-select" name="idMarca" required>
            <option th:each="m : ${marcas}"
                    th:value="${m.idMarca}"
                    th:text="${m.nombre}"
                    th:selected="${p.marca != null && p.marca.idMarca == m.idMarca}">
            </option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Tipo de repuesto</label>
          <select class="form-select" name="idTipo" required>
            <option th:each="t : ${tipos}"
                    th:value="${t.idTipo}"
                    th:text="${t.nombre}"
                    th:selected="${p.tipo != null && p.tipo.idTipo == t.idTipo}">
            </option>
          </select>
        </div>

        <div class="col-12">
          <label class="form-label">Descripción</label>
          <textarea class="form-control" name="descripcion" rows="3" th:text="${p.descripcion}"></textarea>
        </div>

        <div class="col-12">
          <label class="form-label">Compatibilidad</label>
          <textarea class="form-control" name="compatibilidad" rows="2" th:text="${p.compatibilidad}"
                    placeholder="Ej: Toyota Hilux 2012-2016, Nissan Frontier 2015..."></textarea>
        </div>

        <div class="col-md-6">
          <label class="form-label">Imagen (opcional)</label>
          <input class="form-control" type="file" name="imagen" accept="image/*">
          <small class="text-secondary">Si subís, se guarda en Firebase y se actualiza la URL.</small>
        </div>

        <div class="col-md-6">
          <label class="form-label">Activo</label>
          <select class="form-select" name="activo">
            <option value="true"  th:selected="${p.activo == null || p.activo}">Sí</option>
            <option value="false" th:selected="${p.activo != null && !p.activo}">No</option>
          </select>
        </div>

        <div class="col-12" th:if="${p.rutaImagen != null}">
          <label class="form-label">Vista previa</label><br>
          <img th:src="${p.rutaImagen}" style="max-width:320px;border-radius:16px">
        </div>

      </div>

      <div class="d-flex gap-2 mt-4">
        <button class="btn btn-brand">Guardar</button>
        <a class="btn btn-soft" th:href="@{/admin/productos}">Cancelar</a>
      </div>

    </form>
  </div>
</section>
