<div th:with="title='Carrito', content=~{::section}"
     th:replace="layout :: none"></div>

<section>
  <div class="mb-4">
    <h1 class="page-title">Carrito</h1>
    <p class="page-subtitle">Modificá cantidades o confirmá tu pedido.</p>
  </div>

  <div class="table-darkish p-3" th:if="${#lists.isEmpty(items)}">
    <p class="m-0">Tu carrito está vacío.</p>
    <a class="btn btn-soft mt-3" th:href="@{/productos}">Ir al catálogo</a>
  </div>

  <div th:if="${!#lists.isEmpty(items)}">
    <div class="table-darkish">
      <table class="table table-borderless mb-0">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th style="width:160px">Cantidad</th>
            <th>Subtotal</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="it : ${items}">
            <td class="align-middle">
              <div class="d-flex align-items-center gap-2">
                <img th:src="${it.img} ?: 'https://via.placeholder.com/60'"
                     style="width:60px;height:45px;object-fit:cover;border-radius:10px">
                <span th:text="${it.nombre}"></span>
              </div>
            </td>
            <td class="align-middle">₡<span th:text="${it.precio}"></span></td>

            <td class="align-middle">
              <form class="d-flex gap-2" th:action="@{/carrito/actualizar}" method="post">
                <input type="hidden" name="idProducto" th:value="${it.idProducto}">
                <input class="form-control" type="number" name="cantidad" min="1" th:value="${it.cantidad}">
                <button class="btn btn-soft btn-sm">OK</button>
              </form>
            </td>

            <td class="align-middle">₡<span th:text="${it.subtotal}"></span></td>

            <td class="align-middle text-end">
              <form th:action="@{/carrito/eliminar}" method="post">
                <input type="hidden" name="idProducto" th:value="${it.idProducto}">
                <button class="btn btn-danger-soft btn-sm">Eliminar</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="total-box mt-3 d-flex justify-content-between align-items-center">
      <div class="fw-bold">Total:</div>
      <div class="price">₡<span th:text="${total}"></span></div>
    </div>

    <form class="mt-3" th:action="@{/pedido/confirmar}" method="post">
      <button class="btn btn-brand w-100">Confirmar pedido (simulado)</button>
    </form>
  </div>
</section>
