<div th:with="title='Admin - Productos', content=~{::section}"
     th:replace="layout :: none"></div>

<section>
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="page-title">Admin · Productos</h1>
      <p class="page-subtitle">Crear, editar, desactivar y ver inventario.</p>
    </div>
    <a class="btn btn-brand" th:href="@{/admin/productos/nuevo}">+ Nuevo producto</a>
  </div>

  <div class="table-darkish">
    <table class="table table-borderless mb-0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Marca</th>
          <th>Tipo</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Activo</th>
          <th class="text-end">Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr th:each="p : ${lista}">
          <td th:text="${p.idProducto}"></td>
          <td th:text="${p.nombre}"></td>
          <td th:text="${p.marca.nombre}"></td>
          <td th:text="${p.tipo.nombre}"></td>
          <td>₡<span th:text="${p.precio}"></span></td>
          <td th:text="${p.stock}"></td>
          <td>
            <span th:if="${p.activo}" class="badge-stock">Sí</span>
            <span th:if="${!p.activo}" class="badge-out">No</span>
          </td>

          <td class="text-end">
            <div class="d-inline-flex gap-2">
              <a class="btn btn-soft btn-sm" th:href="@{/admin/productos/editar/{id}(id=${p.idProducto})}">Editar</a>

              <form th:if="${p.activo}" th:action="@{/admin/productos/desactivar}" method="post">
                <input type="hidden" name="idProducto" th:value="${p.idProducto}">
                <button class="btn btn-danger-soft btn-sm">Desactivar</button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="mt-3">
    <a class="btn btn-soft" th:href="@{/productos}">Volver al catálogo</a>
  </div>
</section>
