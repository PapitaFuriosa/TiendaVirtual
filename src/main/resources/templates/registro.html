<div th:with="title='Registro', content=~{::section}"
     th:replace="layout :: none"></div>

<section class="row justify-content-center">
  <div class="col-md-6">
    <div class="table-darkish p-4">
      <h2 class="page-title mb-1">Registro</h2>
      <p class="page-subtitle mb-3">Creá tu cuenta para comprar.</p>

      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

      <form th:action="@{/registro}" method="post" th:object="${form}">
        <div class="row g-2">
          <div class="col-md-6">
            <label class="form-label">Usuario</label>
            <input class="form-control" th:field="*{username}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Contraseña</label>
            <input class="form-control" type="password" th:field="*{password}">
          </div>

          <div class="col-md-6">
            <label class="form-label">Nombre</label>
            <input class="form-control" th:field="*{nombre}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Apellidos</label>
            <input class="form-control" th:field="*{apellidos}">
          </div>

          <div class="col-md-6">
            <label class="form-label">Correo</label>
            <input class="form-control" th:field="*{correo}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Teléfono</label>
            <input class="form-control" th:field="*{telefono}">
          </div>
        </div>

        <button class="btn btn-brand w-100 mt-3">Crear cuenta</button>
      </form>

      <div class="mt-3">
        <a class="btn btn-soft w-100" th:href="@{/login}">Volver al login</a>
      </div>
    </div>
  </div>
</section>
